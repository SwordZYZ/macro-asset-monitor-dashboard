name: Daily Dividend Rate Fetcher

on:
  schedule:
    - cron: '00 11 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-script:
    runs-on: self-hosted
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强行开启 Node.js 24 兼容模式，消除警告

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.RUNNER_PUSH_TOKEN }}

    # 🎯 用下面这段极简本地检测，替代原本会卡死的 uses: astral-sh/setup-uv
    - name: Check and Ensure uv Environment
      run: |
        if command -v uv &> /dev/null; then
          echo "🚀 检测到本地 uv 环境，跳过联网下载"
          uv --version
        else
          echo "❌ 未检测到 uv，尝试本地应急安装"
          pip install uv -i https://pypi.tuna.tsinghua.edu.cn/simple
        fi

    - name: Run Python Script
      run: |
        uv run main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add 930955indicator.xlsx data.json
        # 只有在文件有变动时才提交，避免无意义的构建报错
        git diff-index --quiet HEAD || git commit -m "Update daily indicator data"
        git push origin main