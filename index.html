<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红利低波100指数股息率监控</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 1. 默认浅色模式变量 */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
            --sub-text: #86868b;
            --shadow: rgba(0, 0, 0, 0.05);
            --kpi-bg: #f5f5f7;
            --accent-color: #1890ff; /* 股息率2的蓝色 */
        }

        /* 2. 自动跟随系统的深色模式变量 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --card-bg: #2c2c2e;
                --text-color: #f5f5f7;
                --sub-text: #8e8e93;
                --shadow: rgba(0, 0, 0, 0.3);
                --kpi-bg: #3a3a3c;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 20px; 
            background-color: var(--bg-color); 
            transition: background-color 0.3s ease;
        }
        
        /* 整体容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 { 
            text-align: center; 
            color: var(--text-color); 
            margin-top: 10px;
            margin-bottom: 25px;
            font-size: 36px;       /* 👈 放大到 36px，确立绝对的视觉第一主权 */
            font-weight: 700;       /* 👈 加粗字重 */
            letter-spacing: -0.5px; /* 紧凑的高级感 */
            transition: color 0.3s ease;
        }

        /* 3. 新增：今日最新数据高亮卡片排版 */
        .kpi-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .kpi-card {
            background-color: var(--card-bg);
            padding: 15px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 12px var(--shadow);
            text-align: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            min-width: 260px;
        }

        .kpi-title {
            font-size: 16px;
            color: var(--sub-text);
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
            font-family: sf-pro-display, -apple-system, "SF Mono", Monaco, monospace;
        }

        /* 4. 图表容器 */
        #main { 
            width: 100%; 
            height: 500px; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 12px var(--shadow); 
            box-sizing: border-box;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>红利低波100股息率趋势（T-20）</h2>
        
        <div class="kpi-container">
            <div class="kpi-card">
                <div class="kpi-title" id="latest-date">最新交易日：数据加载中...</div>
                <div class="kpi-value" id="latest-value">-- %</div>
            </div>
        </div>

        <div id="main"></div>
    </div>

    <script>
        let myChart = null;
        let chartData = null;

        const isDarkMode = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

        function renderChart(data) {
            const dates = data.map(item => item['日期Date'].toString().replace(/^(\d{4})(\d{2})(\d{2})$/, '$1-$2-$3'));
            const dp1 = data.map(item => item['股息率1（总股本）D/P1']);
            const dp2 = data.map(item => item['股息率2（计算用股本）D/P2']);

            // ================= 核心细节修改：动态填充上方卡片数据 =================
            if (data && data.length > 0) {
                const latestItem = data[data.length - 1]; // 获取最新一天的数据
                const formattedDate = latestItem['日期Date'].toString().replace(/^(\d{4})(\d{2})(\d{2})$/, '$1-$2-$3');
                const latestDp2 = latestItem['股息率2（计算用股本）D/P2'].toFixed(2);
                
                // 修改 DOM 元素的文本
                document.getElementById('latest-date').innerText = `${formattedDate} 股息率(计算股本)`;
                document.getElementById('latest-value').innerText = `${latestDp2}%`;
            }
            // ===================================================================

            if (myChart) {
                myChart.dispose();
            }

            const currentTheme = isDarkMode() ? 'dark' : null;
            myChart = echarts.init(document.getElementById('main'), currentTheme);

            const themeConfigs = isDarkMode() ? {
                backgroundColor: '#2c2c2e',
                gridColor: '#444446',
            } : {
                backgroundColor: '#ffffff',
                gridColor: '#e5e5ea',
            };

            const option = {
                backgroundColor: themeConfigs.backgroundColor,
                tooltip: { 
                    trigger: 'axis', 
                    backgroundColor: isDarkMode() ? 'rgba(44, 44, 46, 0.96)' : 'rgba(255, 255, 255, 0.96)',
                    textStyle: { color: isDarkMode() ? '#fff' : '#000' }
                },
                // 已经改好的默认不显示股息率1
                legend: { 
                    data: ['股息率1 (总股本)', '股息率2 (计算股本)'], 
                    bottom: 0,
                    selected: {
                        '股息率1 (总股本)': false,
                        '股息率2 (计算股本)': true
                    }
                },
                grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    data: dates, 
                    boundaryGap: false
                },
                yAxis: { 
                    type: 'value', 
                    axisLabel: { formatter: '{value} %' }, 
                    splitLine: { lineStyle: { color: themeConfigs.gridColor } }, 
                    // 已经改好的混合兜底 Y 轴算法
                    min: function (value) {
                        if (value.min >= 4.0) return '4.00';
                        return (Math.floor((value.min - 0.01) * 10) / 10).toFixed(2);
                    },
                    max: function (value) {
                        if (value.max <= 5.0) return '5.00';
                        return (Math.ceil((value.max + 0.01) * 10) / 10).toFixed(2);
                    },
                    // interval: 0.1,
                },
                series: [
                    // 已经改好的更严谨的硬折线风格
                    { name: '股息率1 (总股本)', type: 'line', data: dp1, smooth: false, showSymbol: true, symbolSize: 5, itemStyle: { color: '#ff4d4f' } },
                    { name: '股息率2 (计算股本)', type: 'line', data: dp2, smooth: false, showSymbol: true, symbolSize: 5, itemStyle: { color: '#1890ff' } }
                ]
            };

            myChart.setOption(option);
        }

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                chartData = data;
                renderChart(chartData);
            });

        window.addEventListener('resize', () => {
            if (myChart) myChart.resize();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (chartData) {
                renderChart(chartData);
            }
        });
    </script>
</body>
</html>
